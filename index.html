<script>
  const head = document.getElementById('wizardHead');
  const audio = document.getElementById('laughSound');

  if (audio) {
    audio.volume = 0.5;
  }

  let stopTimer = null;

  head.addEventListener('mouseenter', () => {
    head.classList.add('laughing');

    if (audio) {
      audio.currentTime = 0;
      audio.play().catch(err => {
        console.log("Play prevented:", err);
      });

      if (stopTimer) clearTimeout(stopTimer);
      stopTimer = setTimeout(() => {
        audio.pause();
        audio.currentTime = 0;
      }, 3000);
    }
  });

  head.addEventListener('mouseleave', () => {
    if (audio) {
      audio.pause();
      audio.currentTime = 0;
    }

    if (stopTimer) {
      clearTimeout(stopTimer);
      stopTimer = null;
    }

    setTimeout(() => {
      head.classList.remove('laughing');
    }, 1500);
  });
</script>
